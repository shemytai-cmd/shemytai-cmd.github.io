<style>
  :root{ --gold:#b98b2d; --gold2:#f7df9b; --deep:#785510; --ink:#7e715f; --line:rgba(183,138,34,.24); }
  *{box-sizing:border-box} html{scroll-behavior:smooth}
  body{margin:0; font-family:'Noto Sans TC',system-ui,sans-serif; color:var(--ink); min-height:100vh; overflow-x:hidden;
    background:
      radial-gradient(circle at 16% 8%, rgba(255,255,255,.98), transparent 23%),
      radial-gradient(circle at 80% 12%, rgba(244,224,182,.5), transparent 30%),
      radial-gradient(circle at 86% 78%, rgba(255,229,202,.52), transparent 34%),
      linear-gradient(135deg,#fffdfb 0%,#f7efe3 48%,#fff9ee 100%);}
  body:before, body:after{content:""; position:fixed; inset:-20%; pointer-events:none; z-index:-1;}
  body:before{background-image:radial-gradient(circle, rgba(255,255,255,.9) 0 1px, transparent 1.8px); background-size:54px 54px; opacity:.4; animation:floatDust 18s linear infinite;}
  body:after{background:conic-gradient(from 120deg at 50% 42%, transparent, rgba(255,255,255,.5), rgba(244,216,138,.18), transparent, rgba(232,210,170,.22), transparent); filter:blur(30px); opacity:.8; animation:slowSpin 38s linear infinite;}
  @keyframes floatDust{to{transform:translate3d(28px,56px,0)}} @keyframes slowSpin{to{transform:rotate(360deg)}}
  .wrap{width:min(760px,92vw); margin:auto; padding:0 0 48px;}
  .topbar{display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:26px;}
  a.back{color:#9d782d; text-decoration:none; border:1px solid rgba(183,138,34,.28); padding:9px 15px; font-size:13px; letter-spacing:.08em; background:rgba(255,255,255,.4); backdrop-filter:blur(18px); white-space:nowrap; transition:.2s;}
  a.back:hover{background:rgba(255,255,255,.72);}
  .brand{display:flex; align-items:center; gap:11px; text-decoration:none;}
  .brand img.flame{height:42px; width:auto; display:block;}
  .brand .bt{font-family:'Noto Sans TC'; font-weight:500; letter-spacing:.28em; color:#9a711b; font-size:18px; line-height:1.1; text-indent:.28em;}
  .brand .bt small{display:block; font-family:'Cormorant Garamond',serif; font-size:9px; letter-spacing:.3em; margin-top:5px; color:#b18b44; text-indent:.3em;}
  .brand:hover{filter:drop-shadow(0 0 10px rgba(244,216,138,.45));}

  .card h3{margin:0 0 12px; font-family:'Cormorant Garamond',serif; letter-spacing:.14em; color:#8a641a; font-weight:500; font-size:20px; display:flex; align-items:center; gap:9px;}

<body>
  <div class="hero">
    <div class="hero-panel">
      <div class="kicker">Subtitle Video Studio</div>
      <h1>字幕影片生成器</h1>
      <p class="lead">載入影片 · 貼上歌詞 · 跟著唱打拍 · 選好樣式，<br>在瀏覽器裡直接燒好字幕並下載成片。<br>建議使用電腦版 Chrome。</p>
    </div>
  </div>
<div class="wrap">
  </div>


  <div class="card">
    <h3>載入影片</h3>
    <input type="file" id="file" accept="video/*">
    <div class="preview">
      <video id="au" controls playsinline></video>
      <div id="ovl"></div>
    </div>
  </div>

  <div class="card">
    <h3>貼上歌詞（一句一行）</h3>
    <textarea id="lyr" placeholder="一句一行"></textarea>
    <button class="btn wide ghost" id="loadlyr" style="margin-top:10px;">載入歌詞 ↓</button>
  </div>

  <button class="btn big" id="tap">▶ 跟著歌詞打拍（空白鍵）</button>
  <div class="row">
    <button class="btn ghost" id="undo">↩ 撤銷上一句</button>
    <button class="btn ghost" id="reset">✕ 重來</button>
    <button class="btn ghost" id="back3">⏪ 倒退3秒</button>
  </div>
  <div class="status" id="status">先載入影片、貼歌詞、按「載入歌詞」</div>
  <div class="lines" id="lines"></div>

  <div class="card" style="margin-top:16px;">
    <h3>字幕樣式</h3>
    <div class="styleRow">
      <label>顏色 <input type="color" id="col" value="#ffffff"></label>
      <label>大小 <input type="range" id="siz" min="30" max="120" value="66"> <span id="sizv">66</span></label>
    </div>
  </div>

  <button class="btn big" id="gen">🎬 生成影片（下載 .webm）</button>
  <div class="prog" id="prog"><i></i></div>
  <div class="status" id="genmsg"></div>
  <button class="btn wide ghost" id="saveSrt">另外匯出字幕檔 .srt</button>
  <div class="hint">你不用知道秒數——每按一下自動記下當下時間。生成是「邊播邊錄」，3 分鐘影片約需 3 分鐘，過程請勿切換分頁。輸出 .webm 各平台皆可上傳；需要 .mp4 再轉檔即可。</div>

  <footer>
    <a class="homebtn" href="https://shemytai-cmd.github.io/Shemy-brand/">返回品牌首頁</a>
    <div class="studio">閃閃發光設計工作室</div>
  </footer>
</div>

<canvas id="cv"></canvas>
<script>
let lyrics=[],times=[],idx=0,recording=false;
const au=document.getElementById('au'),ovl=document.getElementById('ovl'),
  linesEl=document.getElementById('lines'),statusEl=document.getElementById('status'),
  genMsg=document.getElementById('genmsg'),col=document.getElementById('col'),
  siz=document.getElementById('siz'),sizv=document.getElementById('sizv'),
  prog=document.getElementById('prog'),progBar=prog.querySelector('i');

document.getElementById('file').onchange=e=>{const f=e.target.files[0];if(f){au.src=URL.createObjectURL(f);genMsg.textContent='已載入：'+f.name;}};
document.getElementById('loadlyr').onclick=()=>{const r=document.getElementById('lyr').value.split('\n').map(s=>s.trim()).filter(s=>s);
  if(!r.length){statusEl.textContent='請先貼歌詞';return;}lyrics=r;times=new Array(r.length).fill(null);idx=0;
  try{localStorage.setItem('gv_lyr',JSON.stringify(r));localStorage.removeItem('gv_t');}catch(e){}render();};
siz.oninput=()=>{sizv.textContent=siz.value;updateOverlay();};
col.oninput=updateOverlay;

function two(n){return String(n).padStart(2,'0');}
function fmt(t){return two(Math.floor(t/60))+':'+ (t%60).toFixed(2).padStart(5,'0');}
function srtT(t){const h=Math.floor(t/3600),m=Math.floor(t%3600/60),s=Math.floor(t%60),ms=Math.round((t-Math.floor(t))*1000);
  return two(h)+':'+two(m)+':'+two(s)+','+String(ms).padStart(3,'0');}
function curLine(t){let r='';for(let i=0;i<lyrics.length;i++){if(times[i]==null)continue;
  const st=times[i],en=(i+1<lyrics.length&&times[i+1]!=null)?times[i+1]-0.08:st+5;if(t>=st&&t<en)r=lyrics[i];}return r;}
function updateOverlay(){const scale=au.clientWidth/(au.videoWidth||1080);
  ovl.style.color=col.value;ovl.style.fontSize=(siz.value*scale)+'px';
  ovl.style.textShadow='0 0 4px rgba(0,0,0,.55),0 2px 3px rgba(0,0,0,.5)';
  ovl.textContent=curLine(au.currentTime);}
au.addEventListener('timeupdate',updateOverlay);
au.addEventListener('loadedmetadata',updateOverlay);

function render(){linesEl.innerHTML='';lyrics.forEach((L,i)=>{const d=document.createElement('div');
  d.className='line'+(i<idx?' done':'')+(i===idx?' current':'');
  d.innerHTML='<span>'+L+'</span><span class="t">'+(times[i]!=null?fmt(times[i]):'—')+'</span>';linesEl.appendChild(d);});
  const c=linesEl.querySelector('.current');if(c)c.scrollIntoView({block:'center',behavior:'smooth'});
  statusEl.textContent=!lyrics.length?'先載入影片、貼歌詞、按「載入歌詞」':(idx<lyrics.length?('下一句： '+lyrics[idx]):'✅ 打完了！選好樣式後按「生成影片」');}
function tap(){if(!lyrics.length||idx>=lyrics.length||recording)return;times[idx]=au.currentTime;idx++;
  try{localStorage.setItem('gv_t',JSON.stringify(times));}catch(e){}render();}
document.getElementById('tap').onclick=tap;
document.addEventListener('keydown',e=>{if(e.code==='Space'&&!recording){e.preventDefault();tap();}});
document.getElementById('undo').onclick=()=>{if(idx>0){idx--;times[idx]=null;render();}};
document.getElementById('reset').onclick=()=>{times=new Array(lyrics.length).fill(null);idx=0;render();};
document.getElementById('back3').onclick=()=>{au.currentTime=Math.max(0,au.currentTime-3);};

document.getElementById('saveSrt').onclick=()=>{let o='',n=0;for(let i=0;i<lyrics.length;i++){if(times[i]==null)continue;n++;
  const st=times[i];let en=(i+1<lyrics.length&&times[i+1]!=null)?times[i+1]-0.08:st+5;if(en<=st)en=st+2;
  o+=n+'\n'+srtT(st)+' --> '+srtT(en)+'\n'+lyrics[i]+'\n\n';}
  if(!o){genMsg.textContent='還沒有時間碼';return;}const b=new Blob([o],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='字幕.srt';a.click();genMsg.textContent='已存 字幕.srt';};

document.getElementById('gen').onclick=async ()=>{
  if(!au.src){genMsg.textContent='請先載入影片';return;}
  if(!times.some(t=>t!=null)){genMsg.textContent='請先打拍歌詞';return;}
  const cv=document.getElementById('cv');const W=au.videoWidth,H=au.videoHeight;cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');
  let aStream;try{aStream=au.captureStream?au.captureStream():au.mozCaptureStream();}catch(e){aStream=null;}
  const cStream=cv.captureStream(30);
  const tracks=[...cStream.getVideoTracks()];
  if(aStream&&aStream.getAudioTracks().length)tracks.push(aStream.getAudioTracks()[0]);
  const stream=new MediaStream(tracks);
  let mime='video/webm;codecs=vp9,opus';
  if(!MediaRecorder.isTypeSupported(mime))mime='video/webm;codecs=vp8,opus';
  if(!MediaRecorder.isTypeSupported(mime))mime='video/webm';
  const rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:10000000});
  const chunks=[];rec.ondataavailable=e=>{if(e.data.size)chunks.push(e.data);};
  rec.onstop=()=>{const blob=new Blob(chunks,{type:'video/webm'});const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);a.download='字幕影片.webm';a.click();
    recording=false;prog.style.display='none';document.getElementById('gen').disabled=false;
    genMsg.textContent='✅ 完成！已下載「字幕影片.webm」';};
  const color=col.value,fsize=parseInt(siz.value);
  function draw(){ctx.drawImage(au,0,0,W,H);
    const line=curLine(au.currentTime);
    if(line){ctx.font='700 '+fsize+'px "PingFang TC","Microsoft JhengHei","Noto Sans CJK TC",sans-serif';
      ctx.textAlign='center';ctx.textBaseline='alphabetic';
      const x=W/2,y=H*0.9;ctx.lineJoin='round';
      ctx.lineWidth=Math.max(3,fsize*0.14);ctx.strokeStyle='rgba(0,0,0,0.65)';ctx.strokeText(line,x,y);
      ctx.fillStyle=color;ctx.fillText(line,x,y);}
    progBar.style.width=(au.currentTime/au.duration*100)+'%';
    if(recording)requestAnimationFrame(draw);}
  recording=true;prog.style.display='block';document.getElementById('gen').disabled=true;
  genMsg.textContent='🎬 生成中…請勿切換分頁（約等於影片長度）';
  au.pause();au.currentTime=0;
  await new Promise(r=>au.addEventListener('seeked',r,{once:true}));
  rec.start(100);au.play();requestAnimationFrame(draw);
  au.onended=()=>{setTimeout(()=>{if(rec.state!=='inactive')rec.stop();},200);};
};

try{const L=JSON.parse(localStorage.getItem('gv_lyr')||'null'),T=JSON.parse(localStorage.getItem('gv_t')||'null');
  if(L){lyrics=L;document.getElementById('lyr').value=L.join('\n');times=(T&&T.length===L.length)?T:new Array(L.length).fill(null);
    idx=times.filter(x=>x!=null).length;render();}}catch(e){}
