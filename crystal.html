<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水晶幸運幾何 · 專屬神聖幾何</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100;200;300;400&family=Space+Grotesk:wght@300;400;500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#B8964E;--gold2:#D4AF6E;--gold-bg:#B8964E;
  --gold-pale:rgba(184,150,78,.1);
  --cream:#FDFAF6;--cream2:#F5EFE6;
  --ink:#1C1410;--text2:#6B5F52;--text3:#A89880;
  --border:rgba(184,150,78,.2);
  --glass:rgba(255,255,255,0.55);--glass2:rgba(255,255,255,0.75);
}
body{font-family:'Noto Sans TC',sans-serif;font-weight:300;background:var(--cream);color:var(--ink);min-height:100vh;}

.hero-banner{width:100%;position:relative;overflow:hidden;height:clamp(260px,48vw,380px);}
.hero-banner svg{width:100%;height:100%;display:block;}
.hero-title-panel{position:absolute;bottom:0;left:0;right:0;background:var(--glass2);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:16px 20px 18px;text-align:center;border-top:1px solid rgba(184,150,78,.25);}
.hero-crown{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:5px;}
.hero-eye{font-family:'Space Grotesk',sans-serif;font-size:.58rem;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;}
.hero-main-title{font-family:'Noto Sans TC',sans-serif;font-weight:300;font-size:clamp(1.1rem,4vw,1.55rem);color:var(--gold);letter-spacing:.1em;margin-bottom:3px;}
.hero-en{font-family:'Space Grotesk',sans-serif;font-size:.58rem;letter-spacing:.18em;color:var(--text2);text-transform:uppercase;}
.home-btn{position:absolute;top:12px;left:12px;font-family:'Space Grotesk',sans-serif;font-size:.5rem;letter-spacing:.12em;color:var(--gold);text-decoration:none;border:1px solid var(--border);padding:5px 11px;text-transform:uppercase;background:var(--glass);backdrop-filter:blur(6px);transition:all .2s;z-index:10;}
.home-btn:hover{background:var(--gold);color:var(--cream);}

.sec-banner{width:100%;position:relative;margin:28px 0 0;}
.banner-svg-mini{width:100%;height:clamp(55px,10vw,75px);display:block;}
.sec-banner-glass{position:absolute;bottom:0;left:0;right:0;background:rgba(253,250,246,0.65);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);padding:9px 16px;text-align:center;border-top:1px solid var(--border);}
.sec-crown{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:3px;}
.sec-eye{font-family:'Space Grotesk',sans-serif;font-size:.5rem;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;}
.sec-title{font-family:'Noto Sans TC',sans-serif;font-weight:300;font-size:.88rem;color:var(--gold);letter-spacing:.08em;}

.quiz-wrap{max-width:540px;margin:0 auto;padding:0 18px 60px;}
.quiz-intro{text-align:center;padding:22px 0 18px;}
.quiz-intro-text{font-size:.72rem;color:var(--text2);line-height:2;letter-spacing:.05em;text-align:center;}

.q-block{margin-bottom:20px;}
.q-label{font-family:'Space Grotesk',sans-serif;font-size:.54rem;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;margin-bottom:6px;display:block;}
.q-hint{font-size:.57rem;color:var(--text3);margin-bottom:7px;}
.q-input{width:100%;padding:9px 13px;background:var(--cream2);border:1px solid var(--border);color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-weight:300;font-size:.78rem;outline:none;letter-spacing:.04em;transition:border .2s;}
.q-input:focus{border-color:var(--gold);}
.q-input::placeholder{color:var(--text3);}
.bday-row{display:flex;gap:7px;}
.bday-row .q-input{flex:1;}

.chip-group{display:flex;flex-wrap:wrap;gap:5px;}
.chip{padding:5px 12px;border:1px solid var(--border);background:var(--cream);color:var(--text2);font-family:'Noto Sans TC',sans-serif;font-weight:300;font-size:.65rem;cursor:pointer;border-radius:0;transition:all .2s;letter-spacing:.04em;}
.chip:hover{border-color:var(--gold);color:var(--gold);}
.chip.selected{background:var(--gold-bg);border-color:var(--gold);color:#fff;font-weight:400;}

.gen-btn{width:100%;padding:14px;background:var(--gold-bg);border:none;color:#fff;font-family:'Noto Sans TC',sans-serif;font-weight:300;font-size:.88rem;letter-spacing:.2em;cursor:pointer;margin-top:8px;transition:all .3s;}
.gen-btn:hover{background:var(--gold2);}

.result-section{display:none;max-width:540px;margin:0 auto;padding:0 18px 60px;}
.result-section.show{display:block;}
.result-name-area{text-align:center;padding:20px 0 14px;border-bottom:1px solid var(--border);margin-bottom:18px;}
.result-name{font-family:'Noto Sans TC',sans-serif;font-weight:200;font-size:clamp(.95rem,3.5vw,1.2rem);color:var(--ink);letter-spacing:.1em;margin-bottom:4px;}
.result-subtitle{font-size:.56rem;color:var(--text3);letter-spacing:.12em;font-family:'Space Grotesk',sans-serif;text-transform:uppercase;}
.canvas-phone{width:min(270px,74vw);margin:0 auto 18px;border:1px solid var(--border);box-shadow:0 4px 22px rgba(184,150,78,.12);}
.canvas-phone canvas{width:100%;height:auto;display:block;}
.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;}
.stat-box{padding:10px 12px;background:var(--cream2);border:1px solid var(--border);}
.stat-box.gold-box{background:var(--gold-bg);border-color:var(--gold);}
.stat-label{font-size:.46rem;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;font-family:'Space Grotesk',sans-serif;margin-bottom:3px;}
.gold-box .stat-label{color:rgba(255,255,255,.7);}
.stat-val{font-size:.72rem;color:var(--ink);letter-spacing:.04em;font-weight:300;}
.gold-box .stat-val{color:#fff;}
.result-desc{background:var(--cream2);border:1px solid var(--border);border-left:2px solid var(--gold);padding:14px 16px;font-size:.72rem;line-height:2;color:var(--text2);letter-spacing:.04em;margin-bottom:16px;}
.result-desc strong{color:var(--gold);font-weight:400;}
.dl-btn{width:100%;padding:12px;background:var(--gold-bg);border:none;color:#fff;font-family:'Noto Sans TC',sans-serif;font-weight:300;font-size:.65rem;letter-spacing:.15em;cursor:pointer;margin-bottom:7px;transition:all .2s;}
.dl-btn:hover{background:var(--gold2);}
.dl-btn.sec{background:transparent;border:1px solid var(--border);color:var(--text2);}
.dl-btn.sec:hover{border-color:var(--gold);color:var(--gold);}

.loader{display:none;text-align:center;padding:60px 20px;}
.loader.show{display:block;}
.loader-ring{width:42px;height:42px;border:1px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:.63rem;color:var(--text3);letter-spacing:.12em;}

.site-footer{background:var(--cream2);padding:24px 20px;text-align:center;border-top:1px solid var(--border);margin-top:40px;}
.footer-crown{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:7px;}
.footer-name{font-family:'Noto Sans TC',sans-serif;font-weight:200;font-size:.7rem;letter-spacing:.15em;color:var(--ink);margin-bottom:2px;}
.footer-en{font-family:'Space Grotesk',sans-serif;font-size:.53rem;letter-spacing:.2em;color:var(--text3);text-transform:uppercase;margin-bottom:12px;}
.footer-home{
  display:inline-block;
  font-family:'Space Grotesk',sans-serif;font-size:.58rem;letter-spacing:.15em;
  color:var(--gold);text-decoration:none;text-transform:uppercase;
  border:1px solid var(--border);
  padding:8px 20px;
  background:transparent;
  transition:all .2s;
  margin-top:4px;
}
.footer-home:hover{background:var(--gold);color:var(--cream);}

/* Download preview modal */
.dl-modal{
  display:none;position:fixed;inset:0;
  background:rgba(10,5,0,0.92);
  z-index:200;
  flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;
}
.dl-modal.open{display:flex;}
.dl-modal-img{
  max-width:min(320px,85vw);
  max-height:65vh;
  object-fit:contain;
  border:1px solid #C8A030;
  display:block;
}
.dl-modal-hint{
  color:#C8A030;
  font-family:'Noto Sans TC',sans-serif;
  font-size:.75rem;
  text-align:center;
  margin:14px 0 6px;
  letter-spacing:.06em;
}
.dl-modal-hint2{
  color:#888;
  font-family:'Space Grotesk',sans-serif;
  font-size:.62rem;
  text-align:center;
  letter-spacing:.08em;
  margin-bottom:16px;
}
.dl-modal-close{
  background:transparent;
  border:1px solid rgba(200,160,48,0.4);
  color:#C8A030;
  font-family:'Space Grotesk',sans-serif;
  font-size:.6rem;
  letter-spacing:.15em;
  padding:8px 24px;
  cursor:pointer;
  text-transform:uppercase;
}
.dl-modal-close:hover{background:rgba(200,160,48,0.15);}
</style>
</head>

<script>

// ── Chip selection ──
document.querySelectorAll('.chip-group').forEach(group => {
  const maxSel = parseInt(group.dataset.max||'1');
  group.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      if(maxSel === 1) {
        group.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
        chip.classList.add('selected');
      } else {
        if(chip.classList.contains('selected')) {
          chip.classList.remove('selected');
        } else {
          const selected = group.querySelectorAll('.chip.selected');
          if(selected.length < maxSel) chip.classList.add('selected');
        }
      }
    });
  });
});

function getChips(groupId) {
  const sels = document.querySelectorAll(`#chips-${groupId} .chip.selected`);
  return Array.from(sels).map(s=>s.dataset.val);
}

function getChip(groupId) {
  const sel = document.querySelector(`#chips-${groupId} .chip.selected`);
  return sel ? sel.dataset.val : null;
}

function reduceNum(n){
  while(n>9&&n!==11&&n!==22&&n!==33){
    n=n.toString().split('').reduce((a,c)=>a+parseInt(c),0);
  }
  return n;
}
function lifePathNumber(y,m,d){
  const yr=reduceNum(y.toString().split('').reduce((a,c)=>a+parseInt(c),0));
  const mo=reduceNum(m);
  const da=reduceNum(d);
  return reduceNum(yr+mo+da);
}

function getParams(data) {
  const seed = (s) => s ? s.split('').reduce((a,c)=>a+c.charCodeAt(0),0) : 0;
  const zodiacShapes={aries:6,taurus:8,gemini:10,cancer:6,leo:12,virgo:8,libra:10,scorpio:14,sagittarius:16,capricorn:8,aquarius:20,pisces:6};
  const bloodLayers={A:4,B:3,AB:5,O:6};
  const mbtiComplexity={INTJ:0.9,INTP:0.85,ENTJ:0.8,ENTP:0.78,INFJ:0.95,INFP:0.88,ENFJ:0.75,ENFP:0.7,ISTJ:0.72,ISFJ:0.68,ESTJ:0.65,ESFJ:0.6,ISTP:0.82,ISFP:0.77,ESTP:0.62,ESFP:0.58};
  
  
  const lifeNum=data.lifePath||5;
  const zodiac=data.zodiac||'leo';
  const blood=data.blood||'O';
  const mbti=data.mbti||'INFP';
  const hd=data.hd||null;
  const color=data.color||'gold';
  const crystal=data.crystal||'clear_quartz';
  const aspirations=data.aspirations||[];
  const points=zodiacShapes[zodiac]||6;
  const layers=(bloodLayers[blood]||4)+(lifeNum%3);
  const complexity=mbtiComplexity[mbti]||0.75;
  const rotation=(aspirations.length>0?aspirations.reduce((a,v)=>a+v.charCodeAt(0),0)%36:0)*(Math.PI/180);
  const lineWidth=1.0;
  const colors=crystalColorMap[crystal]||colorMap[color]||colorMap.gold;
  const nameSeed=seed(data.name||'Crystal');
  const variation=(nameSeed%100)/100;
  return{points,layers,complexity,rotation,lineWidth,colors,variation,lifeNum,zodiac,blood,mbti,hd,crystal,favoriteColor:color,aspirations};
}

function drawGeometry(canvas,params){
  const W=canvas.width, H=canvas.height;
  const ctx=canvas.getContext('2d');

  // ── Color palettes (vivid, dark-background friendly) ──
  const PALS={
    gold:     ['#FFD060','#FFAA20','#E88800','#C07000'],
    silver:   ['#D0D8E8','#B0B8D0','#9098B8','#7080A0'],
    white:    ['#F0E8FF','#E8E0FF','#E0D8F8','#D8D0F0'],
    black:    ['#8090B8','#6070A0','#485088','#303870'],
    purple:   ['#D070FF','#B040EE','#9010D0','#7000B0'],
    blue:     ['#50B0FF','#2090FF','#0070EE','#0050CC'],
    teal:     ['#00E8D0','#00C8B0','#00A890','#008870'],
    green:    ['#50E850','#20C820','#00A800','#008800'],
    pink:     ['#FF90C8','#FF50A0','#FF1878','#EE0058'],
    red:      ['#FF7070','#FF3030','#EE0808','#CC0000'],
    orange:   ['#FFB050','#FF8818','#EE6600','#CC4800'],
    brown:    ['#DDA870','#BB8850','#996030','#774818'],
    amethyst: ['#C070FF','#9838EE','#7010CC','#5000AA'],
    rose_quartz:['#FFB0D0','#FF80B0','#FF5090','#EE2070'],
    clear_quartz:['#A0DCFF','#70C4FF','#40ACFF','#1094FF'],
    obsidian: ['#9898C8','#7878A8','#585888','#383868'],
    citrine:  ['#FFE030','#FFBE00','#FF9E00','#E07E00'],
    lapis:    ['#5878D8','#3858B8','#183898','#001878'],
    moonstone:['#C0D8FF','#98BCFF','#70A0FF','#4884FF'],
    labradorite:['#30E8C0','#10C8A0','#00A880','#008860'],
    malachite:['#40E860','#10C840','#00A820','#008808'],
    diamond:  ['#B0ECFF','#80DCFF','#50CCFF','#20BCFF'],
    emerald:  ['#20D878','#00B858','#009838','#007818'],
    ruby:     ['#FF3858','#EE1030','#CC0010','#AA0000'],
    sapphire: ['#3060EE','#1040CC','#0028AA','#001888'],
    opal:     ['#FFB8E8','#E0A8FF','#B8D8FF','#FFC8F0'],
  };

  // Use favoriteColor for base, crystal for accent
  const basePal = PALS[params.favoriteColor] || PALS.pink;
  const crystalPal = PALS[params.crystal] || basePal;

  // Deterministic random based on variation seed
  const seed = (params.variation || 0.42) * 1000;
  const rng = (n) => {
    let x = Math.sin(n * 127.1 + seed * 311.7) * 43758.5453;
    return x - Math.floor(x);
  };

  function hexToRgb(hex){
    if(!hex||hex.length<7) return {r:200,g:100,b:200};
    return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)};
  }
  function rgba(hex, a){
    const c=hexToRgb(hex);
    return `rgba(${c.r},${c.g},${c.b},${a})`;
  }

  // ── BACKGROUND: light base from favoriteColor ──
  // Use brightest palette color mixed with white for light background
  const bc = hexToRgb(basePal[0]);
  const bR=Math.min(Math.floor(bc.r*0.35 + 180), 250);
  const bG=Math.min(Math.floor(bc.g*0.35 + 175), 248);
  const bB=Math.min(Math.floor(bc.b*0.35 + 180), 252);
  ctx.fillStyle = `rgb(${bR},${bG},${bB})`;
  ctx.fillRect(0,0,W,H);

  // ── NEBULA: 6 large radial blobs - basePal ONLY (no crystal color mixing) ──
  const blobPos = [
    [0.2,0.2], [0.8,0.15], [0.5,0.45],
    [0.15,0.7], [0.85,0.75], [0.5,0.85]
  ];
  blobPos.forEach(([bx,by], i) => {
    const nx = (bx + rng(i*3)*0.22 - 0.11) * W;
    const ny = (by + rng(i*3+1)*0.22 - 0.11) * H;
    const nr = (0.22 + rng(i*3+2)*0.3) * W;
    // Only use basePal - no crystalPal in main nebula
    const palColor = basePal[i % basePal.length];
    const g = ctx.createRadialGradient(nx,ny,0,nx,ny,nr);
    g.addColorStop(0, rgba(palColor, 0.35));
    g.addColorStop(0.4, rgba(palColor, 0.12));
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
  });

  // ── ACCENT BLOBS: basePal only, no crystal mixing ──
  for(let i=0; i<4; i++){
    const nx = rng(i*5+30) * W;
    const ny = rng(i*5+31) * H;
    const nr = (0.12 + rng(i*5+32)*0.18) * W;
    const g = ctx.createRadialGradient(nx,ny,0,nx,ny,nr);
    g.addColorStop(0, rgba(basePal[i % basePal.length], 0.25));
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
  }

  // ── OPAL: iridescent puffs - pink/lavender/blue tones only ──
  if(params.crystal==='opal'){
    const opalColors=['#FFB0D8','#D0A0FF','#A0C0FF','#FFD0E8','#C0A8FF','#FFB8E8'];
    opalColors.forEach((col,i)=>{
      const ox=rng(i*4+60)*W, oy=rng(i*4+61)*H;
      const or2=(0.1+rng(i*4+62)*0.28)*W;
      const g=ctx.createRadialGradient(ox,oy,0,ox,oy,or2);
      g.addColorStop(0, rgba(col,0.25));
      g.addColorStop(0.5, rgba(col,0.1));
      g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    });
  }

  // ── STARS: small dots ──
  for(let i=0;i<160;i++){
    const sx=rng(i+100)*W, sy=rng(i+200)*H;
    const sr=rng(i+300)*1.4+0.15;
    const sa=rng(i+400)*0.65+0.2;
    ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);
    // On light bg, stars are light colored spots
    ctx.fillStyle=`rgba(${bc.r},${bc.g},${bc.b},${sa*0.4})`;ctx.fill();
  }

  // ── MINI STARBURSTS (4-point, tiny, scattered) ──
  for(let i=0;i<25;i++){
    const sx=rng(i+500)*W, sy=rng(i+600)*H;
    const sz=rng(i+700)*W*0.01+W*0.003;
    const sa=rng(i+800)*0.6+0.3;
    ctx.save();ctx.translate(sx,sy);ctx.rotate(rng(i+900)*Math.PI*2);
    ctx.beginPath();
    for(let p=0;p<12;p++){
      const pa=(p/12)*Math.PI*2 - Math.PI/2;
      const pr=p%2===0?sz:sz*0.25;
      if(p===0)ctx.moveTo(Math.cos(pa)*pr,Math.sin(pa)*pr);
      else ctx.lineTo(Math.cos(pa)*pr,Math.sin(pa)*pr);
    }
    ctx.closePath();
    ctx.fillStyle=`rgba(255,255,255,${sa*0.6})`;ctx.fill();
    ctx.restore();
  }

  // ── CENTER GLOW ──
  const cx=W/2, cy=H*0.38, maxR=Math.min(W,H*0.6)*0.38;
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,maxR*1.2);
  cg.addColorStop(0,'rgba(255,255,255,0.5)');
  cg.addColorStop(0.35,rgba(basePal[0],0.12));
  cg.addColorStop(1,'transparent');
  ctx.fillStyle=cg;ctx.fillRect(0,0,W,H);

  // ── GEOMETRY ──
  const {points,layers,rotation,variation,lifeNum}=params;
  const petals=Math.max(6,Math.min(20,points)); // min 6, always even-like

  const GOLD='rgba(200,155,30,1)';
  const GOLD_M='rgba(200,155,30,0.7)';
  const GOLD_L='rgba(200,155,30,0.4)';
  const W_LINE='rgba(255,255,255,0.7)';
  const W_LINE2='rgba(255,255,255,0.45)';
  const W_FILL='rgba(255,255,255,0.25)';
  const W_FILL2='rgba(255,255,255,0.4)';

  ctx.save();ctx.translate(cx,cy);ctx.rotate(rotation+variation*0.5);

  // Outer rings
  for(let l=0;l<Math.min(layers,5);l++){
    const r=maxR*(0.98-l*0.12);
    ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(200,155,30,${0.12+l*0.04})`;ctx.lineWidth=0.8;ctx.stroke();
  }

  // ── Flower of life petals (arc-based, white fill + gold stroke) ──
  const petalR=maxR*0.42;
  for(let i=0;i<petals;i++){
    const a=(i/petals)*Math.PI*2;
    const px=Math.cos(a)*petalR, py=Math.sin(a)*petalR;
    ctx.beginPath();ctx.arc(px,py,petalR,0,Math.PI*2);
    ctx.fillStyle=W_FILL;ctx.fill();
    ctx.strokeStyle=GOLD_M;ctx.lineWidth=0.9;ctx.stroke();
  }
  // Center petal circle
  ctx.beginPath();ctx.arc(0,0,petalR,0,Math.PI*2);
  ctx.fillStyle=W_FILL2;ctx.fill();
  ctx.strokeStyle=GOLD;ctx.lineWidth=1.1;ctx.stroke();

  // Inner ring (white, rotated)
  ctx.rotate(Math.PI/petals);
  for(let i=0;i<petals;i++){
    const a=(i/petals)*Math.PI*2;
    const px=Math.cos(a)*maxR*0.28, py=Math.sin(a)*maxR*0.28;
    ctx.beginPath();ctx.arc(px,py,maxR*0.28,0,Math.PI*2);
    ctx.strokeStyle=W_LINE2;ctx.lineWidth=0.65;ctx.stroke();
  }
  ctx.rotate(-Math.PI/petals);

  // Arc mandala (white arcs at each petal point)
  for(let i=0;i<petals;i++){
    const a=(i/petals)*Math.PI*2;
    const px=Math.cos(a)*maxR*0.55, py=Math.sin(a)*maxR*0.55;
    ctx.beginPath();ctx.arc(px,py,maxR*0.28,a+Math.PI*0.5,a+Math.PI*1.5);
    ctx.strokeStyle=W_LINE;ctx.lineWidth=0.75;ctx.stroke();
  }

  // Concentric arcs (white, rotating)
  for(let i=0;i<petals;i++){
    const sa=(i/petals)*Math.PI*2;
    const ea=sa+Math.PI*(1+variation*0.25);
    const r=maxR*0.22*(0.4+i/petals*0.6);
    ctx.beginPath();ctx.arc(0,0,r,sa,ea);
    ctx.strokeStyle=`rgba(255,255,255,${0.38-i/petals*0.18})`;
    ctx.lineWidth=0.65;ctx.stroke();
  }

  // Metatron hex lines (white)
  const hexPts=[...Array(6)].map((_,i)=>({
    x:Math.cos(i*Math.PI/3)*maxR*0.52,
    y:Math.sin(i*Math.PI/3)*maxR*0.52
  }));
  hexPts.push({x:0,y:0});
  for(let a=0;a<hexPts.length;a++){
    for(let b=a+1;b<hexPts.length;b++){
      ctx.beginPath();ctx.moveTo(hexPts[a].x,hexPts[a].y);ctx.lineTo(hexPts[b].x,hexPts[b].y);
      ctx.strokeStyle=W_LINE2;ctx.lineWidth=0.42;ctx.stroke();
    }
  }

  // Life number curved dots
  for(let i=0;i<lifeNum&&i<12;i++){
    const a=(i/Math.max(lifeNum,1))*Math.PI*2-Math.PI/2;
    const lpR=maxR*0.74;
    const dx=Math.cos(a)*lpR, dy=Math.sin(a)*lpR;
    ctx.beginPath();ctx.arc(dx,dy,maxR*0.026,0,Math.PI*2);
    ctx.fillStyle='rgba(200,155,30,0.8)';ctx.fill();
    ctx.strokeStyle=GOLD;ctx.lineWidth=0.65;ctx.stroke();
    // Curved spoke
    ctx.beginPath();ctx.moveTo(0,0);
    ctx.quadraticCurveTo(-Math.sin(a)*maxR*0.09+dx*0.5,Math.cos(a)*maxR*0.09+dy*0.5,dx,dy);
    ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=0.48;ctx.stroke();
  }

  // Outer accent
  ctx.beginPath();ctx.arc(0,0,maxR*0.87,0,Math.PI*2);
  ctx.strokeStyle=GOLD_L;ctx.lineWidth=0.8;ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,maxR*0.93,-Math.PI*0.08,Math.PI*1.92);
  ctx.strokeStyle=W_LINE2;ctx.lineWidth=0.55;ctx.stroke();

  // ── CENTER: Flower of Life (upright, fixed rotation = 0) ──
  ctx.save(); // save rotation state, draw flower at 0 rotation
  ctx.rotate(-rotation-variation*0.5); // cancel outer rotation → flower always upright
  const fR=maxR*0.14;
  // White semi-transparent fill
  ctx.globalAlpha=0.22;
  for(let i=0;i<6;i++){
    const fa=(i/6)*Math.PI*2 - Math.PI/2; // start from top
    ctx.beginPath();
    ctx.arc(Math.cos(fa)*fR, Math.sin(fa)*fR, fR, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,1)';ctx.fill();
  }
  ctx.beginPath();ctx.arc(0,0,fR,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,1)';ctx.fill();
  ctx.globalAlpha=1;
  // Gold strokes
  for(let i=0;i<6;i++){
    const fa=(i/6)*Math.PI*2 - Math.PI/2;
    ctx.beginPath();
    ctx.arc(Math.cos(fa)*fR, Math.sin(fa)*fR, fR, 0, Math.PI*2);
    ctx.strokeStyle=GOLD;ctx.lineWidth=1.0;ctx.stroke();
  }
  ctx.beginPath();ctx.arc(0,0,fR,0,Math.PI*2);
  ctx.strokeStyle=GOLD;ctx.lineWidth=1.1;ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,fR*2,0,Math.PI*2);
  ctx.strokeStyle=GOLD_L;ctx.lineWidth=0.75;ctx.stroke();
  // Center glow
  const dg=ctx.createRadialGradient(0,0,0,0,0,fR*0.45);
  dg.addColorStop(0,'rgba(255,245,180,0.85)');dg.addColorStop(1,'transparent');
  ctx.fillStyle=dg;ctx.beginPath();ctx.arc(0,0,fR*0.45,0,Math.PI*2);ctx.fill();
  ctx.restore();

  ctx.restore();

  // ── 12 CLOCK-POSITION WHITE STARBURSTS ──
  ctx.save();ctx.translate(cx,cy);
  for(let i=0;i<12;i++){
    const a=(i/12)*Math.PI*2 - Math.PI/2; // start from 12 o'clock, fixed
    const sx=Math.cos(a)*maxR*1.0, sy=Math.sin(a)*maxR*1.0;
    const sz=maxR*0.038;
    ctx.save();ctx.translate(sx,sy);
    // 4-point sharp star (like clock tick)
    ctx.beginPath();
    for(let p=0;p<8;p++){
      const pa=(p/8)*Math.PI*2 - Math.PI/4;
      const pr=p%2===0?sz:sz*0.18;
      if(p===0)ctx.moveTo(Math.cos(pa)*pr,Math.sin(pa)*pr);
      else ctx.lineTo(Math.cos(pa)*pr,Math.sin(pa)*pr);
    }
    ctx.closePath();
    ctx.fillStyle='rgba(255,255,255,0.85)';ctx.fill();
    ctx.restore();
  }
  ctx.restore();
  // Mini white starbursts
  for(let i=0;i<12;i++){
    const a=rng(i*3+200)*Math.PI*2;
    const d=maxR*(0.68+rng(i*3+201)*0.35);
    const sx=Math.cos(a)*d, sy=Math.sin(a)*d;
    const sz=maxR*0.016*(0.5+rng(i*3+202)*0.5);
    ctx.save();ctx.translate(sx,sy);ctx.rotate(rng(i*3+203)*Math.PI);
    ctx.beginPath();
    for(let p=0;p<12;p++){
      const pa=(p/12)*Math.PI*2 - Math.PI/2;
      const pr=p%2===0?sz:sz*0.25;
      if(p===0)ctx.moveTo(Math.cos(pa)*pr,Math.sin(pa)*pr);
      else ctx.lineTo(Math.cos(pa)*pr,Math.sin(pa)*pr);
    }
    ctx.closePath();
    ctx.fillStyle='rgba(255,255,255,0.75)';ctx.fill();
    ctx.restore();
  }
  ctx.restore();

  // ── RUNE RING ──
  if(params.aspirations&&params.aspirations.length>0){
    const runeMap={
      money:{r:'ᚠ'},health:{r:'ᚢ'},obstacle:{r:'ᚦ'},wisdom:{r:'ᚨ'},
      travel:{r:'ᚱ'},creativity:{r:'ᚲ'},relationship:{r:'ᚷ'},joy:{r:'ᚹ'},
      transform:{r:'ᚺ'},willpower:{r:'ᚾ'},stillness:{r:'ᛁ'},harvest:{r:'ᛃ'},
      resilience:{r:'ᛇ'},destiny:{r:'ᛈ'},protection:{r:'ᛉ'},career:{r:'ᛊ'},
      justice:{r:'ᛏ'},family:{r:'ᛒ'},cooperation:{r:'ᛖ'},network:{r:'ᛗ'},
      intuition:{r:'ᛚ'},growth:{r:'ᛝ'},roots:{r:'ᛟ'},newstart:{r:'ᛞ'},
    };
    ctx.save();ctx.translate(cx,cy);
    const ringR=maxR*1.10;
    const ringW=maxR*0.10;

    // Deep gold thick ring
    ctx.beginPath();ctx.arc(0,0,ringR,0,Math.PI*2);
    ctx.strokeStyle='rgba(150,110,10,0.95)';ctx.lineWidth=ringW;ctx.stroke();
    // Bright gold edges
    ctx.beginPath();ctx.arc(0,0,ringR-ringW*0.4,0,Math.PI*2);
    ctx.strokeStyle='rgba(215,170,35,0.75)';ctx.lineWidth=1.4;ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,ringR+ringW*0.4,0,Math.PI*2);
    ctx.strokeStyle='rgba(215,170,35,0.5)';ctx.lineWidth=1.1;ctx.stroke();

    // Rune sequence each ×6
    const picked=params.aspirations.map(a=>runeMap[a]?runeMap[a].r:'✦');
    const TOTAL=Math.max(picked.length*6,18);
    const slots=[];
    for(let i=0;i<TOTAL;i++) slots.push(picked[i%picked.length]);

    ctx.font=`bold ${ringW*0.82}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    for(let i=0;i<slots.length;i++){
      const a=(i/slots.length)*Math.PI*2-Math.PI/2;
      const rx=Math.cos(a)*ringR, ry=Math.sin(a)*ringR;
      ctx.save();ctx.translate(rx,ry);ctx.rotate(a+Math.PI/2);
      ctx.shadowColor='transparent';ctx.shadowBlur=0;
      ctx.fillStyle='rgba(255,252,225,1)';
      ctx.fillText(slots[i],0,0);
      ctx.restore();
    }
    ctx.restore();
  }

  // ── TEXT AREA ──
  const textY=H*0.72;

  // Top separator line
  ctx.save();ctx.strokeStyle='rgba(180,140,30,0.4)';ctx.lineWidth=0.7;
  ctx.beginPath();ctx.moveTo(W*0.15,textY-18);ctx.lineTo(W*0.85,textY-18);ctx.stroke();ctx.restore();

  // Name
  ctx.save();ctx.fillStyle='#6A4E10';
  ctx.font=`400 ${W*0.062}px Cinzel,serif`;ctx.textAlign='center';
  ctx.fillText(params.displayName||'Lucky',W/2,textY);ctx.restore();

  // 的專屬幸運幾何
  ctx.save();ctx.fillStyle='rgba(60,42,12,0.75)';
  ctx.font=`200 ${W*0.026}px 'Noto Sans TC',sans-serif`;ctx.textAlign='center';
  ctx.fillText('的專屬幸運幾何',W/2,textY+W*0.065);ctx.restore();

  // Separator
  ctx.save();ctx.strokeStyle='rgba(180,140,30,0.22)';ctx.lineWidth=0.55;
  ctx.beginPath();ctx.moveTo(W*0.25,textY+W*0.09);ctx.lineTo(W*0.75,textY+W*0.09);ctx.stroke();ctx.restore();

  // Life path + zodiac + blood
  ctx.save();ctx.fillStyle='rgba(90,65,12,0.78)';
  ctx.font=`200 ${W*0.022}px 'Noto Sans TC',sans-serif`;ctx.textAlign='center';
  ctx.fillText(`生命靈數 ${params.lifeNum}  ·  ${(params.zodiac||'').toUpperCase()}  ·  ${params.blood||''}型`,W/2,textY+W*0.115);ctx.restore();

  // Brand
  ctx.save();ctx.strokeStyle='rgba(160,120,25,0.18)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(W*0.2,H*0.930);ctx.lineTo(W*0.8,H*0.930);ctx.stroke();ctx.restore();
  ctx.save();ctx.fillStyle='rgba(100,72,18,0.6)';
  ctx.font=`300 ${W*0.019}px Cinzel,serif`;ctx.textAlign='center';
  ctx.fillText('閃閃發光設計工作室',W/2,H*0.948);
  ctx.fillStyle='rgba(100,72,18,0.42)';
  ctx.font=`200 ${W*0.016}px 'Space Grotesk',sans-serif`;
  ctx.fillText('Sparkling Design Studio',W/2,H*0.967);ctx.restore();
}



function generateDesc(data,params){
  const zodiacDesc={
    aries:'你的靈魂擁有火焰般的開創能量，如同第一道光芒刺破黑暗',taurus:'你的頻率穩定而深沉，大地的力量在你的核心共鳴',
    gemini:'雙重靈魂的你如同風元素般流動，在光與影之間穿梭',cancer:'月亮的潮汐流淌在你的情感宇宙中，感知力超越常人',
    leo:'你是自己星系的太陽，光芒是你的本質，閃耀是你的使命',virgo:'細緻如水晶切割的心智，你的精準性是宇宙給予的禮物',
    libra:'你的靈魂追求完美的和諧，如同宇宙最美的對稱幾何',scorpio:'深海般的靈魂，你的轉化力量能將黑暗化為光明',
    sagittarius:'射手的箭指向宇宙的邊界，自由是你最深的渴望',capricorn:'山脈般屹立的意志力，你與地球的古老智慧共鳴',
    aquarius:'你是時代的先行者，宇宙意識透過你傳遞給世界',pisces:'你游走於夢境與現實之間，是宇宙最敏感的頻率接收者',
  };
  const lpDesc={1:'創造與領導的頻率，你是光的先驅',2:'合作與和諧的頻率，你是橋樑建造者',3:'表達與創意的頻率，你是宇宙的藝術家',4:'穩定與建造的頻率，你是現實的錨點',5:'自由與變化的頻率，你是永恆的探索者',6:'愛與服務的頻率，你是療癒的傳遞者',7:'智慧與深思的頻率，你是宇宙的哲學家',8:'豐盛與力量的頻率，你是顯化的大師',9:'完成與奉獻的頻率，你是靈魂的智者',11:'靈性啟示的頻率，你是光的傳遞者',22:'大師建築師的頻率，你在地球創造宏大藍圖',33:'大師療癒師的頻率，你的愛是宇宙級別的禮物'};
  const z=data.zodiac||'leo';const ln=params.lifeNum;
  const aspNames={money:'財富豐盛',health:'健康活力',obstacle:'突破障礙',wisdom:'智慧溝通',travel:'旅行方向',creativity:'創造洞察',relationship:'關係平衡',joy:'喜悅和諧',transform:'轉化突破',willpower:'意志克服',stillness:'靜心反省',harvest:'豐收循環',resilience:'韌性重生',destiny:'命運潛力',protection:'保護連結',career:'事業勝利',justice:'正義榮譽',family:'家庭新生',cooperation:'合作信任',network:'人際自我',intuition:'直覺情感',growth:'內在圓滿',roots:'根基穩定',newstart:'全新開始'};
  const aspText=(data.aspirations||[]).map(a=>aspNames[a]||a).join('、')||'豐盛幸運';
  return `<strong>${data.name||'你'}</strong>，你的專屬幸運幾何已生成。<br><br>${zodiacDesc[z]||''}。<br><br>生命靈數 <strong>${ln}</strong> 賦予你獨特的能量藍圖——${lpDesc[ln]||'宇宙的頻率在你身上展現'}。<br><br>你在 2026 年為自己召喚了<strong>${aspText}</strong>的豐盛祝福能量。<br><br>將這張幸運幾何設為手機桌布，讓每天的第一眼都為你帶來美好能量！`;
}

function generateGeometry(){
  const name=document.getElementById('q-name').value.trim()||'幸運靈魂';
  const year=parseInt(document.getElementById('q-year').value);
  const month=parseInt(document.getElementById('q-month').value);
  const day=parseInt(document.getElementById('q-day').value);

  // ── 必填：生日 ──
  if(!year||!month||!day||year<1900||year>2025||month<1||month>12||day<1||day>31){
    alert('請填寫你的出生年月日，才能計算你的專屬生命靈數 ✦');
    return;
  }

  const zodiac=getChip('zodiac'),blood=getChip('blood'),mbti=getChip('mbti'),hd=getChip('hd');
  const color=getChip('color'),crystal=getChip('crystal'),aspirations=getChips('aspiration');
  const layout=getChip('layout')||'portrait';
  const lifePath=lifePathNumber(year,month,day);
  const data={name,lifePath,zodiac,blood,mbti,hd,color,crystal,aspirations,layout};
  const params=getParams(data);params.displayName=name;params.lifeNum=lifePath;params.layout=layout;
  document.getElementById('quizSection').style.display='none';document.querySelectorAll('.sec-banner').forEach(el=>el.style.display='none');
  document.getElementById('loader').classList.add('show');
  setTimeout(()=>{
    document.getElementById('loader').classList.remove('show');
    document.getElementById('resultSection').classList.add('show');
    document.getElementById('res-name').textContent=`${name} 的專屬幸運幾何`;
    document.getElementById('res-subtitle').textContent=`✦ ${(zodiac||'').toUpperCase()} · ${blood||''} · ${mbti||''}`;
    const canvas=document.getElementById('geoCanvas');
    // Set canvas size - logical size only (no HiDPI scaling that breaks display)
    if(layout==='landscape'){
      canvas.width=1920;canvas.height=1080;
    } else {
      canvas.width=540;canvas.height=960;
    }
    canvas.style.width='';canvas.style.height='';
    const drawCtx=canvas.getContext('2d');
    drawCtx.imageSmoothingEnabled=false;
    drawGeometry(canvas,params);
    const runeMapStat={money:{r:'ᚠ'},health:{r:'ᚢ'},obstacle:{r:'ᚦ'},wisdom:{r:'ᚨ'},travel:{r:'ᚱ'},creativity:{r:'ᚲ'},relationship:{r:'ᚷ'},joy:{r:'ᚹ'},transform:{r:'ᚺ'},willpower:{r:'ᚾ'},stillness:{r:'ᛁ'},harvest:{r:'ᛃ'},resilience:{r:'ᛇ'},destiny:{r:'ᛈ'},protection:{r:'ᛉ'},career:{r:'ᛊ'},justice:{r:'ᛏ'},family:{r:'ᛒ'},cooperation:{r:'ᛖ'},network:{r:'ᛗ'},intuition:{r:'ᛚ'},growth:{r:'ᛝ'},roots:{r:'ᛟ'},newstart:{r:'ᛞ'}};
    const aspLabel=data.aspirations&&data.aspirations.length>0?data.aspirations.map(a=>runeMapStat[a]?runeMapStat[a].r:'✦').join(' '):'—';
    const statsData=[
      {l:'生命靈數',v:lifePath,gold:true},
      {l:'幾何花瓣',v:`${params.points} 瓣`,gold:false},
      {l:'幸運符文',v:aspLabel,gold:true},
      {l:'能量層次',v:`${params.layers} 層`,gold:false},
    ];
    document.getElementById('res-stats').innerHTML=statsData.map(s=>`<div class="stat-box${s.gold?' gold-box':''}"><div class="stat-label">${s.l}</div><div class="stat-val">${s.v}</div></div>`).join('');
    document.getElementById('res-desc').innerHTML=generateDesc(data,params);
    document.getElementById('resultSection').scrollIntoView({behavior:'smooth'});
    window._lastData=data;window._lastParams=params;
  },1800);
}

function regenerate(){
  document.getElementById('resultSection').classList.remove('show');
  document.getElementById('quizSection').style.display='block';document.querySelectorAll('.sec-banner').forEach(el=>el.style.display='block');
  window.scrollTo({top:0,behavior:'smooth'});
}

function downloadWallpaper(){
  const canvas=document.getElementById('geoCanvas');
  try {
    const dataURL=canvas.toDataURL('image/png');
    const img=document.getElementById('dlModalImg');
    img.src=dataURL;
    img.onload=function(){
      document.getElementById('dlModal').classList.add('open');
    };
    if(img.complete) document.getElementById('dlModal').classList.add('open');
  } catch(e) {
    alert('請截圖儲存你的幸運幾何 📸');
  }
}
function closeDlModal(){
  document.getElementById('dlModal').classList.remove('open');
  setTimeout(()=>{document.getElementById('dlModalImg').src='';},300);
}

function closeDlModal(){
  document.getElementById('dlModal').classList.remove('open');
  document.getElementById('dlModalImg').src='';
}
