<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>閃閃發光水晶宇宙 · 專屬神聖幾何</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100;200;300;400&family=Space+Grotesk:wght@300;400;500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#B8964E;--gold2:#D4AF6E;--gold-bg:#B8964E;
  --gold-pale:rgba(184,150,78,.1);
  --cream:#FDFAF6;--cream2:#F5EFE6;
  --ink:#1C1410;--text2:#6B5F52;--text3:#A89880;
  --border:rgba(184,150,78,.2);
  --glass:rgba(255,255,255,0.55);--glass2:rgba(255,255,255,0.75);
}
body{font-family:'Noto Sans TC',sans-serif;font-weight:300;background:var(--cream);color:var(--ink);min-height:100vh;}

.hero-banner{width:100%;position:relative;overflow:hidden;height:clamp(240px,45vw,360px);}
.hero-banner svg{width:100%;height:100%;display:block;}
.hero-title-panel{position:absolute;bottom:0;left:0;right:0;background:var(--glass2);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:16px 20px 18px;text-align:center;border-top:1px solid rgba(184,150,78,.25);}
.hero-crown{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:5px;}
.hero-eye{font-family:'Space Grotesk',sans-serif;font-size:.58rem;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;}
.hero-main-title{font-family:'Noto Sans TC',sans-serif;font-weight:200;font-size:clamp(1.1rem,4vw,1.55rem);color:var(--ink);letter-spacing:.1em;margin-bottom:3px;}
.hero-en{font-family:'Space Grotesk',sans-serif;font-size:.58rem;letter-spacing:.18em;color:var(--text2);text-transform:uppercase;}
.home-btn{position:absolute;top:12px;left:12px;font-family:'Space Grotesk',sans-serif;font-size:.5rem;letter-spacing:.12em;color:var(--gold);text-decoration:none;border:1px solid var(--border);padding:5px 11px;text-transform:uppercase;background:var(--glass);backdrop-filter:blur(6px);transition:all .2s;z-index:10;}
.home-btn:hover{background:var(--gold);color:var(--cream);}

.sec-banner{width:100%;position:relative;margin:28px 0 0;}
.banner-svg-mini{width:100%;height:clamp(55px,10vw,75px);display:block;}
.sec-banner-glass{position:absolute;bottom:0;left:0;right:0;background:var(--glass2);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:9px 16px;text-align:center;border-top:1px solid var(--border);}
.sec-crown{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:3px;}
.sec-eye{font-family:'Space Grotesk',sans-serif;font-size:.5rem;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;}
.sec-title{font-family:'Noto Sans TC',sans-serif;font-weight:200;font-size:.88rem;color:var(--ink);letter-spacing:.08em;}

.quiz-wrap{max-width:540px;margin:0 auto;padding:0 18px 60px;}
.quiz-intro{text-align:center;padding:22px 0 18px;}
.quiz-intro-text{font-size:.72rem;color:var(--text2);line-height:2;letter-spacing:.05em;}

.q-block{margin-bottom:20px;}
.q-label{font-family:'Space Grotesk',sans-serif;font-size:.54rem;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;margin-bottom:6px;display:block;}
.q-hint{font-size:.57rem;color:var(--text3);margin-bottom:7px;}
.q-input{width:100%;padding:9px 13px;background:var(--cream2);border:1px solid var(--border);color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-weight:300;font-size:.78rem;outline:none;letter-spacing:.04em;transition:border .2s;}
.q-input:focus{border-color:var(--gold);}
.q-input::placeholder{color:var(--text3);}
.bday-row{display:flex;gap:7px;}
.bday-row .q-input{flex:1;}

.chip-group{display:flex;flex-wrap:wrap;gap:5px;}
.chip{padding:5px 12px;border:1px solid var(--border);background:var(--cream);color:var(--text2);font-family:'Noto Sans TC',sans-serif;font-weight:300;font-size:.65rem;cursor:pointer;border-radius:0;transition:all .2s;letter-spacing:.04em;}
.chip:hover{border-color:var(--gold);color:var(--gold);}
.chip.selected{background:var(--gold-bg);border-color:var(--gold);color:#fff;font-weight:400;}

.gen-btn{width:100%;padding:14px;background:var(--gold-bg);border:none;color:#fff;font-family:'Noto Sans TC',sans-serif;font-weight:300;font-size:.88rem;letter-spacing:.2em;cursor:pointer;margin-top:8px;transition:all .3s;}
.gen-btn:hover{background:var(--gold2);}

.result-section{display:none;max-width:540px;margin:0 auto;padding:0 18px 60px;}
.result-section.show{display:block;}
.result-name-area{text-align:center;padding:20px 0 14px;border-bottom:1px solid var(--border);margin-bottom:18px;}
.result-name{font-family:'Noto Sans TC',sans-serif;font-weight:200;font-size:clamp(.95rem,3.5vw,1.2rem);color:var(--ink);letter-spacing:.1em;margin-bottom:4px;}
.result-subtitle{font-size:.56rem;color:var(--text3);letter-spacing:.12em;font-family:'Space Grotesk',sans-serif;text-transform:uppercase;}
.canvas-phone{width:min(270px,74vw);margin:0 auto 18px;border:1px solid var(--border);box-shadow:0 4px 22px rgba(184,150,78,.12);}
.canvas-phone canvas{width:100%;height:auto;display:block;}
.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;}
.stat-box{padding:10px 12px;background:var(--cream2);border:1px solid var(--border);}
.stat-box.gold-box{background:var(--gold-bg);border-color:var(--gold);}
.stat-label{font-size:.46rem;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;font-family:'Space Grotesk',sans-serif;margin-bottom:3px;}
.gold-box .stat-label{color:rgba(255,255,255,.7);}
.stat-val{font-size:.72rem;color:var(--ink);letter-spacing:.04em;font-weight:300;}
.gold-box .stat-val{color:#fff;}
.result-desc{background:var(--cream2);border:1px solid var(--border);border-left:2px solid var(--gold);padding:14px 16px;font-size:.72rem;line-height:2;color:var(--text2);letter-spacing:.04em;margin-bottom:16px;}
.result-desc strong{color:var(--gold);font-weight:400;}
.dl-btn{width:100%;padding:12px;background:var(--gold-bg);border:none;color:#fff;font-family:'Noto Sans TC',sans-serif;font-weight:300;font-size:.65rem;letter-spacing:.15em;cursor:pointer;margin-bottom:7px;transition:all .2s;}
.dl-btn:hover{background:var(--gold2);}
.dl-btn.sec{background:transparent;border:1px solid var(--border);color:var(--text2);}
.dl-btn.sec:hover{border-color:var(--gold);color:var(--gold);}

.loader{display:none;text-align:center;padding:60px 20px;}
.loader.show{display:block;}
.loader-ring{width:42px;height:42px;border:1px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:.63rem;color:var(--text3);letter-spacing:.12em;}

.site-footer{background:var(--gold-bg);padding:20px;text-align:center;border-top:1px solid rgba(184,150,78,.3);margin-top:40px;}
.footer-crown{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:7px;}
.footer-name{font-family:'Noto Sans TC',sans-serif;font-weight:200;font-size:.7rem;letter-spacing:.15em;color:#fff;margin-bottom:2px;}
.footer-en{font-family:'Space Grotesk',sans-serif;font-size:.53rem;letter-spacing:.2em;color:rgba(255,255,255,.65);text-transform:uppercase;margin-bottom:9px;}
.footer-home{font-family:'Space Grotesk',sans-serif;font-size:.5rem;letter-spacing:.12em;color:rgba(255,255,255,.55);text-decoration:none;text-transform:uppercase;transition:color .2s;}
.footer-home:hover{color:#fff;}
</style>
</head>

      <g transform="translate(28,10) rotate(7,9,30)"><polygon points="9,0 13,9 13,30 5,30 5,9" stroke="rgba(255,255,255,0.55)" stroke-width=".55" fill="none"/></g>
      <g transform="translate(44,16) rotate(-5,6,24)"><polygon points="6,0 9,6 9,24 3,24 3,6" stroke="rgba(255,255,255,0.45)" stroke-width=".43" fill="none"/></g>
    </svg>
  </div></div>
  <div class="footer-name">閃閃發光水晶宇宙</div>
  <div class="footer-en">The Crystal Universe of Light</div>
  <a href="https://shemytai-cmd.github.io/Shemy-brand" class="footer-home">返回品牌首頁 ↗</a>
</footer>

<script>

// ── Chip selection ──
document.querySelectorAll('.chip-group').forEach(group => {
  group.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      group.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
    });
  });
});

function getChip(groupId) {
  const sel = document.querySelector(`#chips-${groupId} .chip.selected`);
  return sel ? sel.dataset.val : null;
}

function lifePathNumber(y, m, d) {
  const str = `${y}${m}${d}`;
  let sum = str.split('').reduce((a, c) => a + parseInt(c), 0);
  while(sum > 9 && sum !== 11 && sum !== 22 && sum !== 33) {
    sum = sum.toString().split('').reduce((a, c) => a + parseInt(c), 0);
  }
  return sum;
}

const colorMap = {
  gold:['#C4A35A','#E8C87A','#F5DFA0'],silver:['#C0C8D0','#D8E0E8','#E8F0F8'],
  white:['#E8E0D8','#F0EAE0','#FDFAF6'],black:['#8890A0','#6870A0','#B0B8C8'],
  purple:['#8B6B9B','#B088C4','#D0A8E0'],blue:['#4A6B9B','#6B8BB8','#9AB0D4'],
  teal:['#2A7070','#4A9090','#7AB8B8'],green:['#4A7A5A','#6A9A6A','#9AC89A'],
  pink:['#C48098','#E0A0B8','#F0C8D8'],red:['#9B4A4A','#C06A6A','#D89090'],
  orange:['#B87840','#D09A60','#E8B880'],brown:['#7A6050','#9A8070','#B8A090'],
};

const crystalColorMap = {
  amethyst:['#8B6B9B','#B088C4','#D0A8E0'],rose_quartz:['#C48098','#E0A0B8','#F0C8D8'],
  clear_quartz:['#C8D4DC','#D8E4EC','#EEF4F8'],obsidian:['#4A5060','#6870A0','#9098C0'],
  citrine:['#C4A35A','#E8C87A','#F5DFA0'],lapis:['#2A4880','#4A68A8','#7090C8'],
  moonstone:['#B0C0D8','#C8D8EC','#E0ECF8'],labradorite:['#4A8878','#70A898','#98C8B8'],
  malachite:['#2A7040','#4A9060','#7AB888'],diamond:['#C0D0DC','#D8E8F0','#EEF4F8'],
  emerald:['#1A6040','#3A8060','#70A888'],ruby:['#9B3040','#C05060','#D88090'],
  sapphire:['#2A4090','#4A60B0','#7090D0'],
};

function getParams(data) {
  const seed = (s) => s ? s.split('').reduce((a,c)=>a+c.charCodeAt(0),0) : 0;
  const zodiacShapes={aries:3,taurus:4,gemini:8,cancer:6,leo:5,virgo:6,libra:8,scorpio:7,sagittarius:3,capricorn:4,aquarius:12,pisces:6};
  const bloodLayers={A:4,B:3,AB:5,O:6};
  const mbtiComplexity={INTJ:0.9,INTP:0.85,ENTJ:0.8,ENTP:0.78,INFJ:0.95,INFP:0.88,ENFJ:0.75,ENFP:0.7,ISTJ:0.72,ISFJ:0.68,ESTJ:0.65,ESFJ:0.6,ISTP:0.82,ISFP:0.77,ESTP:0.62,ESFP:0.58};
  const travelRotation={japan:15,europe:22,bali:8,india:30,egypt:36,nordic:0,greece:18,newzealand:12,peru:27,iceland:3};
  const styleLineWidth={minimal:0.6,luxury:1.2,boho:0.9,natural:0.8,futuristic:1.0,mystical:1.1,classical:0.9,artsy:1.3};
  const lifeNum=data.lifePath||5;
  const zodiac=data.zodiac||'leo';
  const blood=data.blood||'O';
  const mbti=data.mbti||'INFP';
  const hd=data.hd||null;
  const color=data.color||'gold';
  const crystal=data.crystal||'clear_quartz';
  const travel=data.travel||'japan';
  const style=data.style||'mystical';
  const points=zodiacShapes[zodiac]||6;
  const layers=(bloodLayers[blood]||4)+(lifeNum%3);
  const complexity=mbtiComplexity[mbti]||0.75;
  const rotation=(travelRotation[travel]||0)*(Math.PI/180);
  const lineWidth=styleLineWidth[style]||1.0;
  const colors=crystalColorMap[crystal]||colorMap[color]||colorMap.gold;
  const nameSeed=seed(data.name||'Crystal');
  const variation=(nameSeed%100)/100;
  return{points,layers,complexity,rotation,lineWidth,colors,variation,lifeNum,zodiac,blood,mbti};
}

function drawGeometry(canvas,params){
  const W=canvas.width,H=canvas.height;
  const ctx=canvas.getContext('2d');
  // Dreamy pastel background - linear gradient top to bottom
  const bgGrad=ctx.createLinearGradient(0,0,W,H);
  bgGrad.addColorStop(0,'#F2E8F5');
  bgGrad.addColorStop(0.25,'#EAD8F0');
  bgGrad.addColorStop(0.5,'#E8EEF8');
  bgGrad.addColorStop(0.75,'#F5EDE0');
  bgGrad.addColorStop(1,'#F0E8F2');
  ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);
  // Add soft color blobs
  const blob1=ctx.createRadialGradient(W*0.2,H*0.15,0,W*0.2,H*0.15,W*0.4);
  blob1.addColorStop(0,'rgba(220,196,240,0.4)');blob1.addColorStop(1,'transparent');
  ctx.fillStyle=blob1;ctx.fillRect(0,0,W,H);
  const blob2=ctx.createRadialGradient(W*0.8,H*0.3,0,W*0.8,H*0.3,W*0.35);
  blob2.addColorStop(0,'rgba(192,216,240,0.35)');blob2.addColorStop(1,'transparent');
  ctx.fillStyle=blob2;ctx.fillRect(0,0,W,H);
  const blob3=ctx.createRadialGradient(W*0.5,H*0.7,0,W*0.5,H*0.7,W*0.45);
  blob3.addColorStop(0,'rgba(240,208,220,0.3)');blob3.addColorStop(1,'transparent');
  ctx.fillStyle=blob3;ctx.fillRect(0,0,W,H);
  // Soft sparkle dots (pastel style)
  ctx.save();
  for(let i=0;i<60;i++){
    const sx=Math.random()*W,sy=Math.random()*H,sr=Math.random()*1.4+0.3;
    const sparkleColors=['rgba(184,150,78,0.35)','rgba(180,160,200,0.3)','rgba(160,190,220,0.3)','rgba(220,180,200,0.3)'];
    ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);
    ctx.fillStyle=sparkleColors[Math.floor(Math.random()*sparkleColors.length)];ctx.fill();
  }
  ctx.restore();
  const cx=W/2,cy=H*0.42,maxR=Math.min(W,H*0.6)*0.44;
  const{points,layers,complexity,rotation,colors,lineWidth,variation,lifeNum}=params;
  // Center soft glow
  const glow=ctx.createRadialGradient(cx,cy,0,cx,cy,maxR*1.2);
  glow.addColorStop(0,'rgba(255,255,255,0.5)');
  glow.addColorStop(0.4,`${colors[0]}18`);
  glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow;ctx.fillRect(0,0,W,H);
  ctx.save();ctx.translate(cx,cy);ctx.rotate(rotation+variation*0.3);
  for(let l=layers;l>=1;l--){
    const r=maxR*(l/layers);const alpha=0.2+(l/layers)*0.5;
    ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);
    ctx.strokeStyle=`${colors[0]}${Math.floor(alpha*255).toString(16).padStart(2,'0')}`;
    ctx.lineWidth=lineWidth*0.9;ctx.stroke();
  }
  const petalR=maxR*0.28;
  for(let i=0;i<6;i++){
    const angle=(i*Math.PI*2/6);
    ctx.beginPath();ctx.arc(Math.cos(angle)*petalR,Math.sin(angle)*petalR,petalR,0,Math.PI*2);
    ctx.strokeStyle=`${colors[0]}90`;ctx.lineWidth=lineWidth*1.0;ctx.stroke();
  }
  ctx.beginPath();ctx.arc(0,0,petalR,0,Math.PI*2);ctx.strokeStyle=`${colors[0]}A0`;ctx.lineWidth=lineWidth*1.1;ctx.stroke();
  function drawPoly(sides,r,rot,alpha,lw){
    ctx.beginPath();
    for(let i=0;i<=sides;i++){const a=rot+(i/sides)*Math.PI*2;const px=Math.cos(a)*r,py=Math.sin(a)*r;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}
    ctx.strokeStyle=colors[0]+Math.floor(alpha*255).toString(16).padStart(2,'0');ctx.lineWidth=lw;ctx.stroke();
  }
  for(let l=0;l<Math.min(layers,4);l++){
    const r=maxR*(0.95-l*0.15);const rot=l*Math.PI/(points*2);
    drawPoly(points,r,rot,0.75+l*0.05,lineWidth*(1.4-l*0.15));
  }
  const innerPoints=points===3?6:(points===4?3:(points-1||3));
  drawPoly(innerPoints,maxR*0.55,Math.PI/innerPoints,0.6,lineWidth*1.1);
  drawPoly(innerPoints,maxR*0.35,0,0.5,lineWidth*0.9);
  const spokeCount=points*2;
  for(let i=0;i<spokeCount;i++){
    const a=(i/spokeCount)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*maxR*0.92,Math.sin(a)*maxR*0.92);
    ctx.strokeStyle=`${colors[0]}70`;ctx.lineWidth=lineWidth*0.6;ctx.stroke();
  }
  const hexPts=Array.from({length:6},(_,i)=>({x:Math.cos(i*Math.PI/3)*maxR*0.55,y:Math.sin(i*Math.PI/3)*maxR*0.55}));
  hexPts.push({x:0,y:0});
  for(let a=0;a<hexPts.length;a++){for(let b=a+1;b<hexPts.length;b++){
    ctx.beginPath();ctx.moveTo(hexPts[a].x,hexPts[a].y);ctx.lineTo(hexPts[b].x,hexPts[b].y);
    ctx.strokeStyle=`${colors[0]}40`;ctx.lineWidth=lineWidth*0.5;ctx.stroke();
  }}
  const lpR=maxR*0.12*(lifeNum/9*0.5+0.5);
  for(let i=0;i<lifeNum&&i<9;i++){
    const a=(i/Math.max(lifeNum,1))*Math.PI*2-Math.PI/2;const d=maxR*0.72;
    ctx.beginPath();ctx.arc(Math.cos(a)*d,Math.sin(a)*d,lpR*0.22,0,Math.PI*2);
    ctx.fillStyle=colors[2]+'CC';ctx.fill();ctx.strokeStyle=colors[0]+'EE';ctx.lineWidth=lineWidth*0.7;ctx.stroke();
  }
  const dS=maxR*0.12;
  ctx.beginPath();ctx.moveTo(0,-dS*1.4);ctx.lineTo(dS,0);ctx.lineTo(0,dS*1.0);ctx.lineTo(-dS,0);ctx.closePath();
  ctx.strokeStyle=colors[0]+'FF';ctx.lineWidth=lineWidth*1.4;ctx.stroke();
  const dotGrad=ctx.createRadialGradient(0,0,0,0,0,dS*0.6);
  dotGrad.addColorStop(0,colors[2]+'CC');dotGrad.addColorStop(1,'transparent');
  ctx.fillStyle=dotGrad;ctx.beginPath();ctx.arc(0,0,dS*0.6,0,Math.PI*2);ctx.fill();
  function star4(cx2,cy2,r1,r2){
    ctx.beginPath();
    for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2-Math.PI/2;const r=i%2===0?r1:r2;if(i===0)ctx.moveTo(cx2+Math.cos(a)*r,cy2+Math.sin(a)*r);else ctx.lineTo(cx2+Math.cos(a)*r,cy2+Math.sin(a)*r);}
    ctx.closePath();ctx.strokeStyle=colors[1]+'EE';ctx.lineWidth=lineWidth*1.0;ctx.stroke();
  }
  star4(0,0,dS*0.5,dS*0.12);
  ctx.restore();
  const textY=H*0.76;
  ctx.save();ctx.strokeStyle=`${colors[0]}60`;ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(W*0.15,textY-24);ctx.lineTo(W*0.85,textY-24);ctx.stroke();ctx.restore();
  ctx.save();ctx.fillStyle=colors[0];ctx.font=`400 ${W*0.068}px Cinzel,serif`;ctx.textAlign='center';
  ctx.shadowColor='rgba(255,255,255,0.8)';ctx.shadowBlur=12;ctx.fillText(params.displayName||'Crystal Soul',W/2,textY);ctx.restore();
  ctx.save();ctx.fillStyle='rgba(100,80,60,0.75)';ctx.font=`200 ${W*0.032}px 'Noto Sans TC',sans-serif`;
  ctx.textAlign='center';ctx.fillText('的宇宙印記',W/2,textY+W*0.075);ctx.restore();
  ctx.save();ctx.fillStyle=colors[0]+'BB';ctx.font=`300 ${W*0.028}px 'Space Grotesk',sans-serif`;
  ctx.textAlign='center';ctx.fillText(`生命靈數 ${params.lifeNum}  ·  ${(params.zodiac||'').toUpperCase()}  ·  ${params.blood||''}`,W/2,textY+W*0.13);ctx.restore();
  ctx.save();ctx.strokeStyle=`${colors[0]}70`;ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(W*0.2,textY+W*0.165);ctx.lineTo(W*0.8,textY+W*0.165);ctx.stroke();ctx.restore();
  ctx.save();ctx.fillStyle=`${colors[0]}99`;ctx.font=`300 ${W*0.026}px Cinzel,serif`;ctx.textAlign='center';
  ctx.fillText('閃閃發光水晶宇宙',W/2,H*0.94);
  ctx.fillStyle=`${colors[0]}77`;ctx.font=`300 ${W*0.022}px 'Space Grotesk',sans-serif`;
  ctx.fillText('THE CRYSTAL UNIVERSE OF LIGHT',W/2,H*0.97);ctx.restore();
}

function generateDesc(data,params){
  const zodiacDesc={
    aries:'你的靈魂擁有火焰般的開創能量，如同第一道光芒刺破黑暗',taurus:'你的頻率穩定而深沉，大地的力量在你的核心共鳴',
    gemini:'雙重靈魂的你如同風元素般流動，在光與影之間穿梭',cancer:'月亮的潮汐流淌在你的情感宇宙中，感知力超越常人',
    leo:'你是自己星系的太陽，光芒是你的本質，閃耀是你的使命',virgo:'細緻如水晶切割的心智，你的精準性是宇宙給予的禮物',
    libra:'你的靈魂追求完美的和諧，如同宇宙最美的對稱幾何',scorpio:'深海般的靈魂，你的轉化力量能將黑暗化為光明',
    sagittarius:'射手的箭指向宇宙的邊界，自由是你最深的渴望',capricorn:'山脈般屹立的意志力，你與地球的古老智慧共鳴',
    aquarius:'你是時代的先行者，宇宙意識透過你傳遞給世界',pisces:'你游走於夢境與現實之間，是宇宙最敏感的頻率接收者',
  };
  const lpDesc={1:'創造與領導的頻率，你是光的先驅',2:'合作與和諧的頻率，你是橋樑建造者',3:'表達與創意的頻率，你是宇宙的藝術家',4:'穩定與建造的頻率，你是現實的錨點',5:'自由與變化的頻率，你是永恆的探索者',6:'愛與服務的頻率，你是療癒的傳遞者',7:'智慧與深思的頻率，你是宇宙的哲學家',8:'豐盛與力量的頻率，你是顯化的大師',9:'完成與奉獻的頻率，你是靈魂的智者',11:'靈性啟示的頻率，你是光的傳遞者',22:'大師建築師的頻率，你在地球創造宏大藍圖',33:'大師療癒師的頻率，你的愛是宇宙級別的禮物'};
  const z=data.zodiac||'leo';const ln=params.lifeNum;
  return `<strong>${data.name||'你'}的宇宙印記</strong>已生成。<br><br>${zodiacDesc[z]||''}。<br><br>生命靈數 <strong>${ln}</strong> 賦予你獨特的能量藍圖——${lpDesc[ln]||'宇宙的頻率在你身上展現'}。<br><br>這幅神聖幾何是你靈魂頻率的視覺化，將它設為桌布，每天連結你的宇宙本質。`;
}

function generateGeometry(){
  const name=document.getElementById('q-name').value.trim()||'水晶靈魂';
  const year=parseInt(document.getElementById('q-year').value);
  const month=parseInt(document.getElementById('q-month').value);
  const day=parseInt(document.getElementById('q-day').value);
  const zodiac=getChip('zodiac'),blood=getChip('blood'),mbti=getChip('mbti'),hd=getChip('hd');
  const color=getChip('color'),crystal=getChip('crystal'),travel=getChip('travel'),food=getChip('food'),style=getChip('style');
  const lifePath=(year&&month&&day)?lifePathNumber(year,month,day):5;
  const data={name,lifePath,zodiac,blood,mbti,hd,color,crystal,travel,food,style};
  const params=getParams(data);params.displayName=name;params.lifeNum=lifePath;
  document.getElementById('quizSection').style.display='none';
  document.getElementById('loader').classList.add('show');
  setTimeout(()=>{
    document.getElementById('loader').classList.remove('show');
    document.getElementById('resultSection').classList.add('show');
    document.getElementById('res-name').textContent=`${name} 的宇宙印記`;
    document.getElementById('res-subtitle').textContent=`生命靈數 ${lifePath} · ${(zodiac||'').toUpperCase()} · ${blood||''} · ${mbti||''}`;
    const canvas=document.getElementById('geoCanvas');
    drawGeometry(canvas,params);
    const statsData=[
      {l:'生命靈數',v:lifePath,gold:true},{l:'幾何角點',v:`${params.points} 點`,gold:false},
      {l:'頻率層數',v:`${params.layers} 層`,gold:false},{l:'靈性複雜度',v:`${Math.round(params.complexity*100)}%`,gold:true},
    ];
    document.getElementById('res-stats').innerHTML=statsData.map(s=>`<div class="stat-box${s.gold?' gold-box':''}"><div class="stat-label">${s.l}</div><div class="stat-val">${s.v}</div></div>`).join('');
    document.getElementById('res-desc').innerHTML=generateDesc(data,params);
    document.getElementById('resultSection').scrollIntoView({behavior:'smooth'});
    window._lastData=data;window._lastParams=params;
  },1800);
}

function regenerate(){
  document.getElementById('resultSection').classList.remove('show');
  document.getElementById('quizSection').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function downloadWallpaper(){
  const canvas=document.getElementById('geoCanvas');
  const a=document.createElement('a');
  a.download=`宇宙印記_${document.getElementById('q-name').value||'crystal'}_${Date.now()}.png`;
  a.href=canvas.toDataURL('image/png');a.click();
}

</script>
